repos:
  - owner: "twbs"
    name: "icons"
    ref: "main"
    variants:
      - name: "outline"
        path: "/icons"
        regex: "^(?!.*-fill\\.svg$).*$"
      - name: "filled"
        path: "/icons"
        regex: "-fill\\.svg$"
  - owner: "atisawd"
    name: "boxicons"
    ref: "master"
    variants:
      - name: logos
        path: "/svg/logos"
        colorOn: "fill"
      - name: regular
        path: "/svg/regular"
        colorOn: "fill"
      - name: solid
        path: "/svg/solid"
        colorOn: "fill"
  - owner: "danklammer"
    name: "bytesize-icons"
    github_id: 39126489
    ref: "master"
    variants:
      - name: default
        path: "/dist/icons"
  - owner: "feathericons"
    name: "feather"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tailwindlabs"
    name: "heroicons"
    ref: "master"
    variants:
      - name: "16/solid"
        path: "/optimized/16/solid"
        replacements:
          - "#0F172A"
      - name: "20/solid" 
        path: "/optimized/20/solid"
        replacements:
          - "#0F172A"
      - name: "24"
        path: "/optimized/24/outline"
        replacements:
          - "#0F172A"
      - name: "24"
        path: "/optimized/24/solid"
        replacements:
          - "#0F172A"
  - owner: "lucide-icons"
    name: "lucide"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tabler"
    name: "tabler-icons"
    ref: "main"
    variants:
      - name: filled
        path: "/icons/filled"
      - name: outline
        path: "/icons/outline"
  - owner: "FortAwesome"
    name: "Font-Awesome"
    ref: "7.x"
    variants:
      - name: brands
        path: "/svgs-full/brands"
      - name: regular
        path: "/svgs-full/regular"
      - name: solid
        path: "/svgs-full/solid"
  - owner: "astrit"
    name: "css.gg"
    ref: "main"
    variants:
      - name: default
        path: "/icons/svg"        
  - owner: "iconoir-icons"
    name: "iconoir"
    ref: "main"
    variants:
      - name: regular
        path: "/icons/regular"        
      - name: solid
        path: "/icons/solid"        
  - owner: "mikolajdobrucki"
    name: "ikonate"
    ref: "master"
    variants:
      - name: default
        path: "/icons"        
