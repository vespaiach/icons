repos:
  - owner: "twbs"
    name: "icons"
    ref: "main"
    variants:
      - name: "outline"
        path: "/icons"
        regex: "^(?!.*-fill\\.svg$).*$"
      - name: "filled"
        path: "/icons"
        regex: "-fill\\.svg$"
  - owner: "atisawd"
    name: "boxicons"
    ref: "master"
    variants:
      - name: logos
        path: "/svg/logos"
      - name: regular
        path: "/svg/regular"
      - name: solid
        path: "/svg/solid" 
  - owner: "danklammer"
    name: "bytesize-icons"
    github_id: 39126489
    ref: "master"
    variants:
      - name: default
        path: "/dist/icons"
  - owner: "feathericons"
    name: "feather"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tailwindlabs"
    name: "heroicons"
    ref: "master"
    variants:
      - name: "16/solid"
        path: "/optimized/16/solid"
      - name: "20/solid" 
        path: "/optimized/20/solid"
      - name: "24"
        path: "/optimized/24/outline"
      - name: "24"
        path: "/optimized/24/solid"
  - owner: "lucide-icons"
    name: "lucide"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tabler"
    name: "tabler-icons"
    ref: "main"
    variants:
      - name: filled
        path: "/icons/filled"
      - name: outline
        path: "/icons/outline"