  - owner: "primer"
    name: "octicons"
    ref: "main"
    variants:
      - name: Size 16
        path: "/icons"        
        regex: "-16\\.svg$"
        colorOn: "fill"        
      - name: Size 24
        path: "/icons"        
        regex: "-24\\.svg$"
        colorOn: "fill"        
      - name: Size 12
        path: "/icons"        
