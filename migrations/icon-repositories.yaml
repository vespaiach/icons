repos:
  - owner: "twbs"
    name: "icons"
    ref: "main"
    variants:
      - name: "outline"
        path: "/icons"
        regex: "^(?!.*-fill\\.svg$).*$"
      - name: "filled"
        path: "/icons"
        regex: "-fill\\.svg$"
  - owner: "atisawd"
    name: "boxicons"
    ref: "master"
    variants:
      - name: logos
        path: "/svg/logos"
        colorOn: "fill"
      - name: regular
        path: "/svg/regular"
        colorOn: "fill"
      - name: solid
        path: "/svg/solid"
        colorOn: "fill"
  - owner: "danklammer"
    name: "bytesize-icons"
    github_id: 39126489
    ref: "master"
    variants:
      - name: default
        path: "/dist/icons"
  - owner: "feathericons"
    name: "feather"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tailwindlabs"
    name: "heroicons"
    ref: "master"
    variants:
      - name: "16/solid"
        path: "/optimized/16/solid"
        replacements:
          - "#0F172A"
      - name: "20/solid" 
        path: "/optimized/20/solid"
        replacements:
          - "#0F172A"
      - name: "24"
        path: "/optimized/24/outline"
        replacements:
          - "#0F172A"
      - name: "24"
        path: "/optimized/24/solid"
        replacements:
          - "#0F172A"
  - owner: "lucide-icons"
    name: "lucide"
    ref: "main"
    variants:
      - name: default
        path: "/icons"
  - owner: "tabler"
    name: "tabler-icons"
    ref: "main"
    variants:
      - name: filled
        path: "/icons/filled"
      - name: outline
        path: "/icons/outline"
  - owner: "FortAwesome"
    name: "Font-Awesome"
    ref: "7.x"
    variants:
      - name: brands
        path: "/svgs-full/brands"
      - name: regular
        path: "/svgs-full/regular"
      - name: solid
        path: "/svgs-full/solid"
  - owner: "astrit"
    name: "css.gg"
    ref: "main"
    variants:
      - name: default
        path: "/icons/svg"        
  - owner: "iconoir-icons"
    name: "iconoir"
    ref: "main"
    variants:
      - name: regular
        path: "/icons/regular"        
      - name: solid
        path: "/icons/solid"        
  - owner: "mikolajdobrucki"
    name: "ikonate"
    ref: "master"
    variants:
      - name: default
        path: "/icons"        
        colorOn: "stroke"
  - owner: "primer"
    name: "octicons"
    ref: "main"
    variants:
      - name: Size 16
        path: "/icons"        
        regex: "-16\\.svg$"
        colorOn: "fill"        
      - name: Size 24
        path: "/icons"        
        regex: "-24\\.svg$"
        colorOn: "fill"        
      - name: Size 12
        path: "/icons"        
        regex: "-12\\.svg$"
        colorOn: "fill"
  - owner: "simple-icons"
    name: "simple-icons"
    ref: "master"
    variants:
      - name: default
        path: "/icons"        
        colorOn: "fill"
  - owner: "ant-design"
    name: "ant-design-icons"
    ref: "master"
    variants:
      - name: filled
        path: "/packages/icons-svg/svg/filled"        
        colorOn: "fill"        
      - name: outlined
        path: "/packages/icons-svg/svg/outlined"        
        colorOn: "fill"
      - name: twotones
        path: "/packages/icons-svg/svg/twotone"        
        colorOn: "fill"
  - owner: "uiwjs"
    name: "icons"
    ref: "master"
    variants:
      - name: default
        path: "/icon"        
        replacements:
          - "#555"